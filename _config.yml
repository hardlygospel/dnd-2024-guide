title: D&D 5e 2024 Guide
description: The most comprehensive D&D 5e 2024 player's guide — classes, spells, combat, character builds, loot, and DM tools.
remote_theme: just-the-docs/just-the-docs

color_scheme: dark
search_enabled: true
permalink: pretty

heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

footer_content: "D&D 5e 2024 Guide &mdash; <a href='https://hardlygospel.github.io'>hardlygospel.github.io</a>"

aux_links:
  "← Homepage":
    - "https://hardlygospel.github.io"
  "GitHub":
    - "https://github.com/hardlygospel/dnd-2024-guide"

aux_links_new_tab: true

callouts_level: quiet
callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
